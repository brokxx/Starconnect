<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="c2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30bdc0"/>
      <stop offset="100%" style="stop-color:#c0d950"/>
    </linearGradient>
    <linearGradient id="c2-arc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30bdc0"/>
      <stop offset="100%" style="stop-color:#c0d950"/>
    </linearGradient>
  </defs>

  <!-- Small planet -->
  <circle cx="100" cy="90" r="22" fill="url(#c2-grad)" opacity="0.85"/>

  <!-- Inner glow -->
  <circle cx="100" cy="90" r="22" fill="none" stroke="rgba(48,189,192,0.3)" stroke-width="2"/>

  <!-- Starlink swoosh forming Saturn ring -->
  <path d="M 55 115 Q 100 55 170 42" stroke="url(#c2-arc)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Second thinner ring -->
  <path d="M 48 108 Q 95 60 165 50" stroke="url(#c2-arc)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Small dot accent stars -->
  <circle cx="160" cy="48" r="3" fill="#c0d950" opacity="0.8"/>
  <circle cx="55" cy="65" r="1.5" fill="#30bdc0" opacity="0.5"/>
  <circle cx="150" cy="100" r="1" fill="#fff" opacity="0.4"/>

  <!-- Company name -->
  <text x="190" y="72" font-family="'Open Sans', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" letter-spacing="2">STAR</text>
  <text x="286" y="72" font-family="'Open Sans', Arial, sans-serif" font-size="28" font-weight="300" fill="url(#c2-grad)" letter-spacing="2">CONNECT</text>

  <!-- Thin line separator -->
  <line x1="190" y1="82" x2="395" y2="82" stroke="url(#c2-arc)" stroke-width="1" opacity="0.3"/>

  <text x="190" y="100" font-family="'Open Sans', Arial, sans-serif" font-size="12" font-weight="400" fill="#8a9bae" letter-spacing="6">SOLUTIONS</text>
</svg>
